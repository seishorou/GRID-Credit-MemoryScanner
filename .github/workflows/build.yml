name: Build GRID Scanner

on: [push]

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86
      - name: Compile
        run: cl /EHsc /O2 /MT GRID_Credit_MemoryScanner.cpp /link psapi.lib user32.lib /OUT:GRID_Credit_MemoryScanner.exe
      - uses: actions/upload-artifact@v4
        with:
          name: GRID-Scanner
          path: GRID_Credit_MemoryScanner.exe
