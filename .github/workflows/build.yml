name: Build GRID Credit Memory Scanner

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Build
        shell: cmd
        run: |
          cl /nologo /EHsc /O2 /MT GRID_Credit_MemoryScanner.cpp /link psapi.lib /OUT:GRID_Credit_MemoryScanner.exe

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: GRID_Credit_MemoryScanner
          path: GRID_Credit_MemoryScanner.exe
