name: Build GRID Credit Memory Scanner

"on":
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC x86
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Build Win32 executable
        shell: cmd
        run: cl /nologo /EHsc /O2 /MT /D_WIN32_WINNT=0x0601 /DWINVER=0x0601 GRID_Credit_MemoryScanner.cpp /link /SUBSYSTEM:CONSOLE /OUT:GRID_Credit_MemoryScanner.exe psapi.lib

      - name: Create ZIP
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path package | Out-Null
          Copy-Item GRID_Credit_MemoryScanner.exe package\
          Copy-Item LEIA-ME.txt package\
          Compress-Archive -Path package\* -DestinationPath GRID_Credit_MemoryScanner_Win32.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GRID-Credit-MemoryScanner-Win32
          path: GRID_Credit_MemoryScanner_Win32.zip
